<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple HTML document template.">
    <meta name="keywords" content="HTML, template, document">
    <title>Homepage| web class 2026</title>

     <!-- internal (embedded) CSS -->
    <style> 
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
            height:100vh;
        }
        main {
            background-color: #fff;
            margin: auto;
            padding: 20px;
            width:50%;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            
        }
        h1 {
            color: #333;
            
        }
        p {
            color: #666;
        }
        ul {
            list-style-type: square;
        }
        li {
            border-bottom: #a70 2px solid;
            margin-bottom: 3px;
            padding:5px;
            background-color: yellow;
            color:green
        }

        h2:hover::after,h2:hover::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            margin-left:5px;
        }
        h2::backdrop {
            background: rgba(0, 255, 0, 1);
            position: absolute;
            top:-3px;
        }

        h2::first-letter {
            color: white;
            background-color: hsla(345, 81%, 27%, 0.718);
            padding: 2px;
            font-size: 100%;
        }

        #file::file-selector-button {
            background-color: #89f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome to My Web Class 2026</h1>
        <p>This is a simple HTML document template for our web class. Feel free to explore and customize it as you learn more about web development!</p>

        <input type="file" name="" id="file">
        <section>
            <h2>Topics / Demos</h2>
            <ul>
                <li><a href="layouts.html">CSS Layout</a></li>
                <li><a href="list-demo.html">List Demo</a></li>
                <li><a href="table-demo.html">Table Demo</a></li>
                <li><a href="flex-demo.html">Flex Box Demo</a></li>
        </section>
    </main>
</body>
</html>
