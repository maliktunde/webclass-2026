<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List demo</title>
</head>
<body>
    <h1>List demo</h1>

    <!-- Unordered list -->
    <ul type="disk">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <!-- Ordered list -->
     <ol type="i" start="1">
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>

    <!-- Nested LIst -->
     <ol>
        <li>Nested list
            <ol type="A">
                <li>Subitem 1</li>
                <li>Subitem 2</li>
            </ol>
        </li>
        <li>Another item</li>
    </ol>

    <!-- Data List -->
        <dl>
            <dt>Term 1</dt>
            <dd>Description for term 1.</dd>
            <dt>Term 2</dt>
            <dd>Description for term 2.</dd>
        </dl>
</body>
</html>
