<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Demo</title>
</head>
<body>
    <header>
        <h1>Table Demo</h1>
        <menu>
            <a href="index.html">Home</a> |
            <a href="layouts.html">Layouts</a> |
            <a href="list-demo.html">List Demo</a>
        </menu>
    </header>

    <table border="1" cellspacing="0" cellpadding="15" width="100%">
        <caption>Sample Table</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alice</td>
                <td>30</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>Bob</td>
                <td>25</td>
                <td>Los Angeles</td>
            </tr>
            <tr>
                <td>Charlie</td>
                <td>35</td>
                <td>Chicago</td>
            </tr>
        </tbody>
    </table>

    <!-- Table: 2 - Student list -->
        <table border="1" cellspacing="0" cellpadding="10" width="100%" style="margin-top: 2rem;">
         
            <caption>Student list</caption>
            <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Grade</th>
            </tr>
            <tr>
                <td>001</td>
                <td>Emily</td>
                <td>A</td>
            </tr>
            <tr>
                <td>002</td>
                <td>David</td>
                <td>B+</td>
            </tr>
            <tr>
                <td>003</td>
                <td>Sophia</td>
                <td>A-</td>
            </tr>
        </table>
</body>
</html>
